[project]
name = "data-management-project"
version = "0.1.0"
description = "Restaurant ratings consistency analysis across Google Maps, Tripadvisor, and TheFork (Milan)"
requires-python = ">=3.11"
readme = "README.md"
dependencies = [
    "typer>=0.12",
    "httpx>=0.27",
    "tenacity>=9",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "pymongo>=4.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-mock>=3.14",
    "respx>=0.21",
    "ruff>=0.5",
    "pre-commit>=3.7",
    "mongomock>=4.1",
]

[project.scripts]
pipeline-stage1 = "pipeline.stage1_seed.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pipeline"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
